<!doctype html>
<html lang="af">
<head>
  <meta charset="utf-8"/>
  <title>Graad 9 EBS/EMS · CAPS</title>
  <script>
    // GitHub Pages SPA redirect: send all 404s back to index.html
    // preserving the path in sessionStorage so the app can restore it
    var path = window.location.pathname;
    sessionStorage.setItem('ghpages-redirect', path);
    window.location.replace(window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/') + '/?p=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
